server:
  port: 8080

spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/hoteleria}
    username: ${DB_USER:hoteleria}
    password: ${DB_PASSWORD:hoteleria}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      repositories:
        enabled: false

security:
  jwt:
    issuer: hoteleria-api
    access-token-minutes: 15
    refresh-token-days: 7
    private-key-pem: ${JWT_PRIVATE_KEY_PEM:}
    public-key-pem: ${JWT_PUBLIC_KEY_PEM:}

app:
  security:
    enabled: true
    login-attempts:
      store: ${LOGIN_ATTEMPTS_STORE:memory}
      max-attempts: 5
      lockout-minutes: 15
    mfa:
      ticket-minutes: 5
      encryption:
        password: ${MFA_ENCRYPTION_PASSWORD:change-me}
        salt: ${MFA_ENCRYPTION_SALT:deadbeefcafebabe}
