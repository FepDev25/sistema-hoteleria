openapi: 3.1.0
info:
  title: Sistema de Hoteleria API
  version: 1.1.0
  description: Contrato HTTP del backend de hoteleria, alineado al codigo implementado.

servers:
  - url: /api/v1

tags:
  - name: Auth
  - name: Hotels
  - name: RoomTypes
  - name: Amenities
  - name: Rooms
  - name: Services
  - name: Guests
  - name: Reservations
  - name: Invoices
  - name: Maintenance
  - name: Reviews

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Login exitoso o challenge MFA requerido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '423':
          description: Cuenta bloqueada temporalmente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/mfa/verify:
    post:
      tags: [Auth]
      operationId: verifyMfa
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA verificado, emite token pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPairResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Refresh token valido, rota sesion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenPairResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logout exitoso.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      operationId: me
      responses:
        '200':
          description: Principal autenticado actual.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentPrincipalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /hotels:
    get:
      tags: [Hotels]
      operationId: getHotels
      security: []
      responses:
        '200':
          description: Lista de hoteles activos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HotelResponse'
    post:
      tags: [Hotels]
      operationId: createHotel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelRequest'
      responses:
        '201':
          description: Hotel creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /room-types:
    get:
      tags: [RoomTypes]
      operationId: getRoomTypes
      security: []
      parameters:
        - name: hotelId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de tipos de habitacion.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomTypeResponse'
    post:
      tags: [RoomTypes]
      operationId: createRoomType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomTypeCreateRequest'
      responses:
        '201':
          description: Tipo de habitacion creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomTypeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /amenities:
    get:
      tags: [Amenities]
      operationId: getAmenities
      security: []
      responses:
        '200':
          description: Lista de amenidades.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AmenityResponse'
    post:
      tags: [Amenities]
      operationId: createAmenity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmenityCreateRequest'
      responses:
        '201':
          description: Amenidad creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AmenityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /rooms:
    get:
      tags: [Rooms]
      operationId: getRooms
      security: []
      parameters:
        - name: hotelId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de habitaciones.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomResponse'
    post:
      tags: [Rooms]
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreateRequest'
      responses:
        '201':
          description: Habitacion creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /services:
    get:
      tags: [Services]
      operationId: getServices
      security: []
      parameters:
        - name: hotelId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de servicios.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceResponse'
    post:
      tags: [Services]
      operationId: createService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceCreateRequest'
      responses:
        '201':
          description: Servicio creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /guests:
    post:
      tags: [Guests]
      operationId: createGuest
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuestRequest'
      responses:
        '201':
          description: Huesped creado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /reservations/availability:
    get:
      tags: [Reservations]
      operationId: getAvailability
      parameters:
        - name: hotelId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: checkInDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: checkOutDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: adults
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: children
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Habitaciones disponibles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /reservations:
    post:
      tags: [Reservations]
      operationId: createReservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '201':
          description: Reserva creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /reservations/{id}/confirm:
    post:
      tags: [Reservations]
      operationId: confirmReservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reserva confirmada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /reservations/{id}/check-in:
    post:
      tags: [Reservations]
      operationId: checkInReservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Check-in realizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /reservations/{id}/check-out:
    post:
      tags: [Reservations]
      operationId: checkOutReservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Check-out realizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /reservations/{id}/cancel:
    post:
      tags: [Reservations]
      operationId: cancelReservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelReservationRequest'
      responses:
        '200':
          description: Reserva cancelada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /reservations/{id}/services:
    post:
      tags: [Reservations]
      operationId: addReservationService
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddReservationServiceRequest'
      responses:
        '201':
          description: Consumo agregado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationServiceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /invoices:
    post:
      tags: [Invoices]
      operationId: createInvoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Factura creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /invoices/{id}/issue:
    post:
      tags: [Invoices]
      operationId: issueInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Factura emitida.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /invoices/{id}/pay:
    post:
      tags: [Invoices]
      operationId: payInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '200':
          description: Pago registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /invoices/{id}/refund:
    post:
      tags: [Invoices]
      operationId: refundInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
      responses:
        '200':
          description: Reembolso registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /maintenance-requests:
    post:
      tags: [Maintenance]
      operationId: createMaintenanceRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaintenanceRequestPayload'
      responses:
        '201':
          description: Solicitud de mantenimiento creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaintenanceRequestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /reviews:
    post:
      tags: [Reviews]
      operationId: createReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
      responses:
        '201':
          description: Resena creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AppRole:
      type: string
      enum: [SUPER_ADMIN, HOTEL_ADMIN, RECEPTIONIST, ACCOUNTING, MAINTENANCE, GUEST]

    PrincipalType:
      type: string
      enum: [STAFF, GUEST]

    RoomStatus:
      type: string
      enum: [AVAILABLE, OCCUPIED, MAINTENANCE, OUT_OF_SERVICE]

    ReservationStatus:
      type: string
      enum: [PENDING, CONFIRMED, CHECKED_IN, COMPLETED, CANCELLED]

    InvoiceStatus:
      type: string
      enum: [DRAFT, ISSUED, PAID, VOID]

    PaymentStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED, REFUNDED]

    PaymentMethod:
      type: string
      enum: [CASH, CREDIT_CARD, DEBIT_CARD, BANK_TRANSFER, ONLINE]

    DocumentType:
      type: string
      enum: [PASSPORT, DNI, NIE, DRIVER_LICENSE, OTHER]

    MaintenancePriority:
      type: string
      enum: [LOW, MEDIUM, HIGH, URGENT]

    MaintenanceStatus:
      type: string
      enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]

    AuthLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          format: email
        password:
          type: string
          minLength: 12

    AuthLoginResponse:
      type: object
      required: [requiresMfa]
      properties:
        requiresMfa:
          type: boolean
        mfaTicket:
          type: string
          nullable: true
        mfaChallenge:
          type: string
          nullable: true
        accessToken:
          type: string
          nullable: true
        refreshToken:
          type: string
          nullable: true
        tokenType:
          type: string
          nullable: true
          example: Bearer
        expiresIn:
          type: integer
          nullable: true

    MfaVerifyRequest:
      type: object
      required: [mfaTicket, code]
      properties:
        mfaTicket:
          type: string
        code:
          type: string
          minLength: 6
          maxLength: 8

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string

    AuthTokenPairResponse:
      type: object
      required: [accessToken, refreshToken, tokenType, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 900

    CurrentPrincipalResponse:
      type: object
      required: [userId, principalType, principalId, roles, hotelIds, mfaRequired, mfaEnabled]
      properties:
        userId:
          type: string
          format: uuid
        principalType:
          $ref: '#/components/schemas/PrincipalType'
        principalId:
          type: string
          format: uuid
        roles:
          type: array
          items:
            $ref: '#/components/schemas/AppRole'
        hotelIds:
          type: array
          items:
            type: string
            format: uuid
        mfaRequired:
          type: boolean
        mfaEnabled:
          type: boolean

    HotelRequest:
      type: object
      required: [name, address, city, country, starRating]
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        starRating:
          type: integer
        description:
          type: string
          nullable: true

    HotelResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        city:
          type: string
        country:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        starRating:
          type: integer
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true

    RoomTypeCreateRequest:
      type: object
      required: [hotelId, name, maxCapacity, basePricePerNight]
      properties:
        hotelId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        maxCapacity:
          type: integer
        basePricePerNight:
          type: number
        amenityIds:
          type: array
          items:
            type: string
            format: uuid

    RoomTypeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hotelId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        maxCapacity:
          type: integer
        basePricePerNight:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        amenityIds:
          type: array
          items:
            type: string
            format: uuid

    AmenityCreateRequest:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
        icon:
          type: string
          nullable: true
        category:
          type: string

    AmenityResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
          nullable: true
        category:
          type: string

    RoomCreateRequest:
      type: object
      required: [hotelId, roomTypeId, roomNumber, floor]
      properties:
        hotelId:
          type: string
          format: uuid
        roomTypeId:
          type: string
          format: uuid
        roomNumber:
          type: string
        floor:
          type: integer

    RoomResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hotelId:
          type: string
          format: uuid
        roomTypeId:
          type: string
          format: uuid
        roomNumber:
          type: string
        floor:
          type: integer
        status:
          $ref: '#/components/schemas/RoomStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true

    ServiceCreateRequest:
      type: object
      required: [hotelId, name, unitPrice, category]
      properties:
        hotelId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        unitPrice:
          type: number
        category:
          type: string
        isActive:
          type: boolean
          nullable: true

    ServiceResponse:
      type: object
      properties:
        id:
          type: string
